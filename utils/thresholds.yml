minimorph:
    label: Minimorph
    prefix: MM
    inputs: ["MRR"]
    thresholds: 
       { "MM_supratentorial_tissue": 2 ,
        "MM_supratentorial_csf": 3 ,
        "MM_cerebellum": 1.3 ,
        "MM_cerebellum_csf": 1.5 ,
        "MM_right_thalamus": 1.5 ,
        "MM_left_thalamus": 1.5 ,
        "MM_right_caudate": 1.5 ,
        "MM_left_caudate": 1.5 ,
        "MM_right_putamen": 1.5 ,
        "MM_left_putamen": 1.5 ,
        # "ventricles": 2,
        "MM_brainstem_csf": 1.5}
    
    volumetric_cols: 
        - MM_supratentorial_tissue
        - MM_supratentorial_csf
        - MM_ventricles
        - MM_cerebellum
        - MM_cerebellum_csf
        - MM_brainstem
        - MM_brainstem_csf
        - MM_left_thalamus
        - MM_left_caudate
        - MM_left_putamen
        - MM_left_globus_pallidus
        - MM_right_thalamus
        - MM_right_caudate
        - MM_right_putamen
        - MM_right_globus_pallidus
        - MM_posterior_callosum
        - MM_mid_posterior_callosum
        - MM_central_callosum
        - MM_mid_anterior_callosum
        - MM_anterior_callosum
        - MM_icv
    


